<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Edição - CRM & Finanças</title>
    <style>
        :root {
            --bg-principal: #0d0e15;
            --bg-card: #161925;
            --cor-neon: #7b2cbf;
            --cor-neon-cyan: #00f5d4;
            --texto-claro: #f8f9fa;
            --texto-mutado: #9a9fac;
            --tag-mensal: #3a86ff;
            --tag-video: #ff006e;
            --tag-hibrido: #ffbe0b;
            --cor-remover: #ff4d4d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* TELA DE LOGIN */
        #tela-login {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(123, 44, 191, 0.2);
            border: 1px solid rgba(123, 44, 191, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        #tela-login h2 {
            margin-bottom: 24px;
            color: var(--texto-claro);
        }

        #tela-login h2 span {
            color: var(--cor-neon-cyan);
        }

        .campo-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            background-color: #202437;
            border: 1px solid #2d324d;
            border-radius: 6px;
            color: white;
            font-size: 16px;
        }

        .campo-input:focus {
            outline: none;
            border-color: var(--cor-neon-cyan);
        }

        .btn-acao {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--cor-neon), #9d4edd);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-acao:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(123, 44, 191, 0.4);
        }

        /* PAINEL PRINCIPAL (DASHBOARD) */
        #painel-principal {
            display: none;
            width: 100%;
            max-width: 1200px;
            min-height: 90vh;
            margin: 20px;
            background-color: var(--bg-card);
            border-radius: 16px;
            border: 1px solid #222536;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #222536;
        }

        .header-esquerda {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-menu-lateral {
            background: none;
            border: none;
            color: var(--texto-claro);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .btn-menu-lateral:hover {
            color: var(--cor-neon-cyan);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--texto-claro);
        }

        .logo span { color: var(--cor-neon); }

        .btn-logout {
            background: none;
            border: 1px solid #2d324d;
            color: var(--texto-mutado);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-logout:hover {
            color: var(--cor-remover);
            border-color: var(--cor-remover);
        }

        /* Menu Lateral Retrátil */
        .menu-lateral {
            position: fixed;
            top: 0;
            left: -280px;
            width: 260px;
            height: 100%;
            background-color: #0d0e15;
            border-right: 1px solid #222536;
            z-index: 100;
            padding: 80px 20px 20px 20px;
            transition: 0.3s ease-in-out;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .menu-lateral.aberto {
            left: 0;
        }

        .menu-lateral button {
            width: 100%;
            background: none;
            border: none;
            color: var(--texto-mutado);
            font-size: 16px;
            font-weight: 600;
            text-align: left;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu-lateral button.ativo, .menu-lateral button:hover {
            color: var(--texto-claro);
            background-color: var(--cor-neon);
        }

        .btn-fechar-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--texto-mutado);
            font-size: 20px;
            cursor: pointer;
        }

        .topo-acoes {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            gap: 10px;
        }

        .btn-adicionar {
            padding: 10px 20px;
            background-color: var(--cor-neon-cyan);
            color: #0d0e15;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-adicionar:hover {
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.4);
            transform: translateY(-1px);
        }

        .conteudo-aba {
            display: none;
            padding: 40px;
            flex-grow: 1;
        }

        .conteudo-aba.ativa {
            display: block;
        }

        /* FUNIL DE CLIENTES */
        .funil-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .coluna-funil {
            background-color: #0d0e15;
            padding: 20px;
            border-radius: 10px;
            border-top: 4px solid var(--cor-neon);
            min-height: 300px;
            transition: background-color 0.2s ease;
        }

        .coluna-funil.drag-over {
            background-color: #161925;
        }

        .coluna-funil:nth-child(2) { border-top-color: var(--cor-neon-cyan); }
        .coluna-funil:nth-child(3) { border-top-color: var(--texto-mutado); }

        .coluna-funil h3 {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .coluna-conteudo {
            min-height: 200px;
            height: 100%;
        }

        .card-cliente {
            background-color: var(--bg-card);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid #222536;
            cursor: grab;
            position: relative;
            user-select: none;
        }

        .card-cliente:active {
            cursor: grabbing;
        }

        .card-header-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .avatar-mini {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--texto-mutado);
            background-color: #0d0e15;
        }

        .card-cliente h4 { 
            font-size: 15px;
            padding-right: 20px;
            flex-grow: 1;
        }

        .btn-remover-card {
            position: absolute;
            top: 14px;
            right: 14px;
            background: none;
            border: none;
            color: var(--texto-mutado);
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            z-index: 5;
        }

        .btn-remover-card:hover {
            color: var(--cor-remover);
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .tag.mensal { background-color: var(--tag-mensal); color: white; }
        .tag.video { background-color: var(--tag-video); color: white; }
        .tag.hibrido { background-color: var(--tag-hibrido); color: #0d0e15; }

        .info-meta {
            font-size: 13px;
            color: var(--texto-mutado);
            margin-top: 4px;
        }

        /* PARCEIROS & PORTFÓLIO */
        .secao-parceiros {
            margin-top: 40px;
            background-color: var(--bg-card);
            border: 1px solid #222536;
            border-radius: 12px;
            padding: 24px;
        }

        .secao-parceiros h2 {
            font-size: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--cor-neon-cyan);
            padding-left: 10px;
        }

        .grid-parceiros {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
        }

        .card-parceiro {
            background-color: #0d0e15;
            border: 1px solid #222536;
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            color: var(--texto-claro);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .card-parceiro:hover {
            transform: translateY(-4px);
            border-color: var(--cor-neon-cyan);
            box-shadow: 0 4px 15px rgba(0, 245, 212, 0.15);
        }

        .wrapper-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 12px;
            border: 2px solid #222536;
            background-color: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrapper-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nome-parceiro {
            font-size: 13px;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* FINANCEIRO */
        .resumo-financeiro {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-financeiro {
            background-color: #0d0e15;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #222536;
        }

        .card-financeiro p { color: var(--texto-mutado); font-size: 14px; }
        .card-financeiro h2 { color: var(--cor-neon-cyan); margin-top: 5px; }

        .filtros-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background: #0d0e15;
            padding: 15px;
            border-radius: 8px;
        }

        .filtros-container select {
            background: var(--bg-card);
            border: 1px solid #222536;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .tabela-financeira {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .tabela-financeira th, .tabela-financeira td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #222536;
        }

        .tabela-financeira th { background-color: #0d0e15; color: var(--texto-mutado); }
        .tabela-financeira tbody tr:hover { background-color: #1c2032; }

        .btn-remover-linha {
            background: none;
            border: none;
            color: var(--texto-mutado);
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-remover-linha:hover {
            color: var(--cor-remover);
        }

        /* JANELAS MODAIS */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .modal-overlay.visivel {
            visibility: visible;
            opacity: 1;
        }

        .modal-corpo {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #222536;
        }

        .modal-corpo h3 { margin-bottom: 20px; }
        .modal-botoes { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }

        .btn-cancelar {
            padding: 10px 20px;
            background: none;
            border: 1px solid #2d324d;
            color: var(--texto-mutado);
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="tela-login">
        <h2>Painel <span>Edição</span></h2>
        <input type="text" id="usuario" class="campo-input" placeholder="Usuário">
        <input type="password" id="senha" class="campo-input" placeholder="Senha">
        <button class="btn-acao" onclick="efetuarLogin()">Entrar</button>
    </div>

    <div id="painel-principal">
        <header>
            <div class="header-esquerda">
                <button class="btn-menu-lateral" onclick="alternarMenuLateral()">☰</button>
                <div class="logo">Dashboard <span>Edições</span></div>
            </div>
            <button class="btn-logout" onclick="efetuarLogout()">Sair</button>
        </header>

        <div id="menu-lateral" class="menu-lateral">
            <button class="btn-fechar-menu" onclick="alternarMenuLateral()">✕</button>
            <button id="btn-clientes" class="ativo" onclick="mudarAba('clientes')">Clientes & Prospecção</button>
            <button id="btn-financeiro" onclick="mudarAba('financeiro')">Financeiro</button>
        </div>

        <main id="aba-clientes" class="conteudo-aba ativa">
            <div class="topo-acoes">
                <button class="btn-adicionar" onclick="abrirModal()">➕ Adicionar Cliente</button>
            </div>
            
            <div class="funil-container">
                <div class="coluna-funil" ondragover="permitirSoltar(event)" ondragleave="removerEstiloArrastar(event)" ondrop="soltarCard(event, 'correr-atras')">
                    <h3>Correr Atrás <span>⚡</span></h3>
                    <div id="coluna-correr-atras" class="coluna-conteudo"></div>
                </div>

                <div class="coluna-funil" ondragover="permitirSoltar(event)" ondragleave="removerEstiloArrastar(event)" ondrop="soltarCard(event, 'fechados')">
                    <h3>Clientes Fechados <span>✅</span></h3>
                    <div id="coluna-fechados" class="coluna-conteudo"></div>
                </div>

                <div class="coluna-funil" ondragover="permitirSoltar(event)" ondragleave="removerEstiloArrastar(event)" ondrop="soltarCard(event, 'pausados')">
                    <h3>Pausados / Antigos <span>⏳</span></h3>
                    <div id="coluna-pausados" class="coluna-conteudo"></div>
                </div>
            </div>

            <section class="secao-parceiros">
                <h2>Parceiros & Portfólio</h2>
                <div class="grid-parceiros" id="grid-parceiros"></div>
            </section>
        </main>

        <main id="aba-financeiro" class="conteudo-aba">
            <div class="topo-acoes">
                <button class="btn-adicionar" style="background-color: var(--cor-neon); color: white;" onclick="abrirModalFinanceiro()">➕ Registrar Entrada</button>
            </div>

            <div class="resumo-financeiro">
                <div class="card-financeiro">
                    <p>Total Recebido (Filtrado)</p>
                    <h2 id="total-filtrado">R$ 0,00</h2>
                </div>
                <div class="card-financeiro">
                    <p>Total Geral Cadastrado</p>
                    <h2 id="total-geral">R$ 0,00</h2>
                </div>
            </div>

            <div class="filtros-container">
                <select id="filtro-ano" onchange="filtrarFinanceiro()">
                    <option value="todos">Todos os Anos</option>
                    <option value="2026">2026</option>
                </select>
                <select id="filtro-mes" onchange="filtrarFinanceiro()">
                    <option value="todos">Todos os Meses</option>
                    <option value="01">Janeiro</option>
                    <option value="02">Fevereiro</option>
                    <option value="03">Março</option>
                    <option value="04">Abril</option>
                    <option value="05">Maio</option>
                    <option value="06">Junho</option>
                    <option value="07">Julho</option>
                    <option value="08">Agosto</option>
                    <option value="09">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
            </div>

            <table class="tabela-financeira">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Tipo de Contrato</th>
                        <th>Forma</th>
                        <th>Valor</th>
                        <th style="width: 50px;">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela-financeira"></tbody>
            </table>
        </main>
    </div>

    <div id="modal-cliente" class="modal-overlay">
        <div class="modal-corpo">
            <h3>Novo Cliente</h3>
            <input type="text" id="nome-cliente" class="campo-input" placeholder="Nome do Cliente ou Canal (Opcional se usar link)">
            <input type="text" id="link-cliente" class="campo-input" placeholder="Cole o Link da Página/Canal (YouTube, etc.)">
            <input type="text" id="meta-cliente" class="campo-input" placeholder="Valor ou Proposta (Ex: R$ 150/vídeo)">
            <input type="text" id="status-cliente" class="campo-input" placeholder="Status / Observação rápida">
            
            <label style="display:block; margin-bottom:8px; font-size:14px; color:var(--texto-mutado);">Tipo de Contrato</label>
            <select id="tipo-contrato" class="campo-input">
                <option value="mensal">Mensal</option>
                <option value="video">Por Vídeo</option>
                <option value="hibrido">Híbrido / Quinzenal</option>
            </select>

            <label style="display:block; margin-bottom:8px; font-size:14px; color:var(--texto-mutado);">Coluna do Painel</label>
            <select id="coluna-destino" class="campo-input">
                <option value="correr-atras">Correr Atrás</option>
                <option value="fechados">Clientes Fechados</option>
                <option value="pausados">Pausados / Antigos</option>
                <option value="apenas-parceiro">Apenas adicionar em Parceiros</option>
            </select>

            <div class="modal-botoes">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-adicionar" style="background-color:var(--cor-neon); color:white;" onclick="salvarCliente()">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-financeiro" class="modal-overlay">
        <div class="modal-corpo">
            <h3>Registrar Entrada</h3>
            <label style="display:block; margin-bottom:8px; font-size:14px; color:var(--texto-mutado);">Qual cliente pagou?</label>
            <select id="financeiro-cliente" class="campo-input"></select>

            <label style="display:block; margin-bottom:8px; font-size:14px; color:var(--texto-mutado);">Valor Recebido (R$)</label>
            <input type="number" id="financeiro-valor" class="campo-input" placeholder="Ex: 1600.00" step="0.01">

            <label style="display:block; margin-bottom:8px; font-size:14px; color:var(--texto-mutado);">Forma de Pagamento</label>
            <select id="financeiro-forma" class="campo-input">
                <option value="Pix">Pix</option>
                <option value="Dinheiro">Dinheiro</option>
                <option value="Transferência">Transferência / TED</option>
                <option value="Cartão">Cartão de Crédito</option>
            </select>

            <label style="display:block; margin-bottom:8px; font-size:14px; color:var(--texto-mutado);">Data do Pagamento</label>
            <input type="date" id="financeiro-data" class="campo-input">

            <div class="modal-botoes">
                <button class="btn-cancelar" onclick="fecharModalFinanceiro()">Cancelar</button>
                <button class="btn-adicionar" style="background-color:var(--cor-neon-cyan); color:#0d0e15;" onclick="salvarFinanca()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        // Variáveis globais para sincronização com o backend
        let BD_CLIENTES = [];
        let BD_FINANCAS = [];

        // Ao carregar a página, verifica a sessão e puxa os dados do arquivo JSON do servidor
        window.onload = function() {
            if (localStorage.getItem('crm_logado') === 'true') {
                mostrarPainelPrincipal();
            } else {
                mostrarTelaLogin();
            }
        };

        async function puxarDadosDoServidor() {
            try {
                const response = await fetch('http://localhost:3000/api/dados');
                if (response.ok) {
                    const dados = await response.json();
                    BD_CLIENTES = dados.clientes || [];
                    BD_FINANCAS = dados.financas || [];
                    renderizarTudo();
                }
            } catch (error) {
                console.error("Não foi possível conectar ao backend para ler dados.", error);
            }
        }

        async function sincronizarComServidor() {
            try {
                await fetch('http://localhost:3000/api/salvar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientes: BD_CLIENTES, financas: BD_FINANCAS })
                });
            } catch (error) {
                console.error("Falha ao salvar dados no backend.", error);
            }
        }

        function efetuarLogin() {
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('senha').value;

            if (user === "garciaeditor" && pass === "135246") {
                localStorage.setItem('crm_logado', 'true');
                mostrarPainelPrincipal();
            } else {
                alert("Usuário ou senha incorretos!");
            }
        }

        function efetuarLogout() {
            localStorage.removeItem('crm_logado');
            mostrarTelaLogin();
        }

        function mostrarPainelPrincipal() {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('painel-principal').style.display = 'flex';
            document.body.style.alignItems = 'flex-start';
            puxarDadosDoServidor(); // Puxa e renderiza os dados reais salvos no servidor
        }

        function mostrarTelaLogin() {
            document.getElementById('tela-login').style.display = 'block';
            document.getElementById('painel-principal').style.display = 'none';
            document.body.style.alignItems = 'center';
        }

        function alternarMenuLateral() {
            document.getElementById('menu-lateral').classList.toggle('aberto');
        }

        function mudarAba(aba) {
            document.querySelectorAll('.conteudo-aba').forEach(el => el.classList.remove('ativa'));
            document.querySelectorAll('.menu-lateral button').forEach(el => el.classList.remove('ativo'));

            if (aba === 'clientes') {
                document.getElementById('aba-clientes').classList.add('ativa');
                document.getElementById('btn-clientes').classList.add('ativo');
            } else if (aba === 'financeiro') {
                document.getElementById('aba-financeiro').classList.add('ativa');
                document.getElementById('btn-financeiro').classList.add('ativo');
                filtrarFinanceiro();
            }
            alternarMenuLateral();
        }

        function abrirModal() { document.getElementById('modal-cliente').classList.add('visivel'); }
        function fecharModal() {
            document.getElementById('modal-cliente').classList.remove('visivel');
            document.getElementById('nome-cliente').value = '';
            document.getElementById('link-cliente').value = '';
            document.getElementById('meta-cliente').value = '';
            document.getElementById('status-cliente').value = '';
        }

        // Sistema de Arrastar e Soltar (Drag and Drop) atualizando o servidor local
        function iniciarArrastar(event) {
            event.dataTransfer.setData("text/plain", event.target.id);
        }

        function permitirSoltar(event) {
            event.preventDefault();
            const colunaFunil = event.target.closest('.coluna-funil');
            if (colunaFunil) colunaFunil.classList.add('drag-over');
        }

        function removerEstiloArrastar(event) {
            const colunaFunil = event.target.closest('.coluna-funil');
            if (colunaFunil) colunaFunil.classList.remove('drag-over');
        }

        function soltarCard(event, idColunaDestino) {
            event.preventDefault();
            const colunaFunil = event.target.closest('.coluna-funil');
            if (colunaFunil) colunaFunil.classList.remove('drag-over');
            
            const idCard = event.dataTransfer.getData("text/plain");
            const cliente = BD_CLIENTES.find(c => c.id === idCard);
            if (cliente) {
                cliente.coluna = idColunaDestino;
                renderizarTudo();
                sincronizarComServidor(); // Grava a movimentação do Kanban imediatamente
            }
        }

        async function salvarCliente() {
            const nomeManual = document.getElementById('nome-cliente').value;
            const urlInserida = document.getElementById('link-cliente').value;
            const meta = document.getElementById('meta-cliente').value;
            const status = document.getElementById('status-cliente').value;
            const tipo = document.getElementById('tipo-contrato').value;
            const coluna = document.getElementById('coluna-destino').value;

            if (!nomeManual && !urlInserida) {
                alert("Por favor, preencha ao menos o nome ou o link do cliente.");
                return;
            }

            let dadosCliente = {
                id: 'cliente-' + Date.now(),
                titulo: nomeManual || "Canal Carregando...",
                imagem: "https://via.placeholder.com/150",
                link: urlInserida || "#",
                meta: meta,
                status: status,
                tipo: tipo,
                coluna: coluna
            };

            if (urlInserida) {
                try {
                    const response = await fetch('http://localhost:3000/api/scrape', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: urlInserida })
                    });

                    if (response.ok) {
                        const dadosRaspados = await response.json();
                        dadosCliente.titulo = nomeManual || dadosRaspados.titulo;
                        dadosCliente.imagem = dadosRaspados.imagem || "https://via.placeholder.com/150";
                    }
                } catch (error) {
                    console.error("Backend offline. Usando os dados inseridos manualmente.", error);
                }
            }

            BD_CLIENTES.push(dadosCliente);
            renderizarTudo();
            sincronizarComServidor(); // Grava no arquivo JSON do servidor local
            fecharModal();
        }

        function removerCliente(idCard) {
            if (confirm("Tem certeza que deseja apagar este cliente permanentemente do banco de dados?")) {
                BD_CLIENTES = BD_CLIENTES.filter(c => c.id !== idCard);
                renderizarTudo();
                sincronizarComServidor();
            }
        }

        // RENDERIZAÇÃO CORRIGIDA USANDO O NOVO PROXY DO BACKEND
        function renderizarTudo() {
            document.getElementById('coluna-correr-atras').innerHTML = '';
            document.getElementById('coluna-fechados').innerHTML = '';
            document.getElementById('coluna-pausados').innerHTML = '';
            document.getElementById('grid-parceiros').innerHTML = '';

            BD_CLIENTES.forEach(cliente => {
                let classeTag = cliente.tipo === 'mensal' ? 'mensal' : (cliente.tipo === 'video' ? 'video' : 'hibrido');
                let textoTag = cliente.tipo === 'mensal' ? 'Mensal' : (cliente.tipo === 'video' ? 'Por Vídeo' : 'Híbrido');

                // MODIFICAÇÃO APENAS AQUI: Redireciona links http/https externos para passar por dentro do nosso proxy local
                let urlImagemTratada = cliente.imagem;
                if (urlImagemTratada && urlImagemTratada.startsWith('http') && !urlImagemTratada.includes('via.placeholder.com')) {
                    urlImagemTratada = `http://localhost:3000/api/proxy-imagem?url=${encodeURIComponent(urlImagemTratada)}`;
                }

                const cardHtml = `
                    <div class="card-cliente" id="${cliente.id}" draggable="true" ondragstart="iniciarArrastar(event)">
                        <button class="btn-remover-card" onclick="removerCliente('${cliente.id}')">✕</button>
                        <span class="tag ${classeTag}">${textoTag}</span>
                        <div class="card-header-info">
                            <img class="avatar-mini" src="${urlImagemTratada}" alt="Avatar" onerror="this.src='https://via.placeholder.com/150'">
                            <h4>${cliente.titulo}</h4>
                        </div>
                        <p class="info-meta">Valor: ${cliente.meta || 'Nenhum'}</p>
                        <p class="info-meta">Obs: ${cliente.status || 'Nenhuma'}</p>
                    </div>
                `;

                if (cliente.coluna === 'correr-atras') {
                    document.getElementById('coluna-correr-atras').insertAdjacentHTML('beforeend', cardHtml);
                } else if (cliente.coluna === 'fechados') {
                    document.getElementById('coluna-fechados').insertAdjacentHTML('beforeend', cardHtml);
                } else if (cliente.coluna === 'pausados') {
                    document.getElementById('coluna-pausados').insertAdjacentHTML('beforeend', cardHtml);
                }

                if (cliente.link && cliente.link !== "#" && cliente.coluna !== 'apenas-parceiro') {
                    const parceiroHtml = `
                        <a href="${cliente.link}" target="_blank" class="card-parceiro" title="Visitar ${cliente.titulo}">
                            <div class="wrapper-avatar">
                                <img src="${urlImagemTratada}" alt="${cliente.titulo}" onerror="this.src='https://via.placeholder.com/150'">
                            </div>
                            <span class="nome-parceiro">${cliente.titulo}</span>
                        </a>
                    `;
                    document.getElementById('grid-parceiros').insertAdjacentHTML('beforeend', parceiroHtml);
                }
            });

            renderizarTabelaFinanceira();
        }

        // SISTEMA FINANCEIRO COMPLETO E SEGURO
        function abrirModalFinanceiro() {
            const selectClientes = document.getElementById('financeiro-cliente');
            selectClientes.innerHTML = '';

            const clientesFechados = BD_CLIENTES.filter(c => c.coluna === 'fechados');

            if (clientesFechados.length === 0) {
                selectClientes.innerHTML = '<option value="">Nenhum cliente fechado encontrado</option>';
            } else {
                clientesFechados.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.titulo;
                    option.setAttribute('data-tipo', c.tipo);
                    option.textContent = c.titulo;
                    selectClientes.appendChild(option);
                });
            }

            document.getElementById('financeiro-data').value = new Date().toISOString().split('T')[0];
            document.getElementById('modal-financeiro').classList.add('visivel');
        }

        function fecharModalFinanceiro() {
            document.getElementById('modal-financeiro').classList.remove('visivel');
            document.getElementById('financeiro-valor').value = '';
        }

        function salvarFinanca() {
            const selectCliente = document.getElementById('financeiro-cliente');
            const clienteNome = selectCliente.value;
            
            if(!clienteNome) {
                alert("Você precisa selecionar um cliente fechado válido.");
                return;
            }

            const optionSelecionada = selectCliente.options[selectCliente.selectedIndex];
            const tipoContrato = optionSelecionada.getAttribute('data-tipo');
            const valorInput = document.getElementById('financeiro-valor').value;
            const formaInput = document.getElementById('financeiro-forma').value;
            const dataInput = document.getElementById('financeiro-data').value;

            if (!valorInput || !dataInput) {
                alert("Por favor, preencha a data e o valor recebido.");
                return;
            }

            const partesData = dataInput.split('-');
            
            const novaFinanca = {
                id: 'financa-' + Date.now(),
                dataInput: dataInput,
                ano: partesData[0],
                mes: partesData[1],
                dia: partesData[2],
                cliente: clienteNome,
                tipo: tipoContrato,
                forma: formaInput,
                valor: parseFloat(valorInput)
            };

            BD_FINANCAS.push(novaFinanca);
            fecharModalFinanceiro();
            renderizarTudo();
            sincronizarComServidor(); // Registra e guarda permanentemente
        }

        function removerLinhaFinanceiro(idFinanca) {
            if (confirm("Tem certeza que deseja apagar este registro financeiro?")) {
                BD_FINANCAS = BD_FINANCAS.filter(f => f.id !== idFinanca);
                renderizarTudo();
                sincronizarComServidor();
            }
        }

        function renderizarTabelaFinanceira() {
            document.getElementById('corpo-tabela-financeira').innerHTML = '';
            BD_FINANCAS.forEach(f => {
                let classeTag = f.tipo === 'mensal' ? 'mensal' : (f.tipo === 'video' ? 'video' : 'hibrido');
                let textoTag = f.tipo === 'mensal' ? 'Mensal' : (f.tipo === 'video' ? 'Por Vídeo' : 'Híbrido');
                
                const linhaHtml = `
                    <tr data-ano="${f.ano}" data-mes="${f.mes}">
                        <td>${f.dia}/${f.mes}/${f.ano}</td>
                        <td>${f.cliente}</td>
                        <td><span class="tag ${classeTag}">${textoTag}</span></td>
                        <td style="color: var(--texto-mutado);">${f.forma}</td>
                        <td class="valor-item">${f.valor.toFixed(2)}</td>
                        <td><button class="btn-remover-linha" onclick="removerLinhaFinanceiro('${f.id}')">✕</button></td>
                    </tr>
                `;
                document.getElementById('corpo-tabela-financeira').insertAdjacentHTML('beforeend', linhaHtml);
            });
            filtrarFinanceiro();
        }

        // Sistema de Filtros e Cálculos Financeiros Automáticos
        function filtrarFinanceiro() {
            const anoFiltrado = document.getElementById('filtro-ano').value;
            const mesFiltrado = document.getElementById('filtro-mes').value;
            const linhas = document.querySelectorAll('#corpo-tabela-financeira tr');
            
            let somaFiltrado = 0;
            let somaGeral = 0;

            linhas.forEach(linha => {
                const anoLinha = linha.getAttribute('data-ano');
                const mesLinha = linha.getAttribute('data-mes');
                const valor = parseFloat(linha.querySelector('.valor-item').textContent);

                somaGeral += valor;

                const bateAno = (anoFiltrado === 'todos' || anoFiltrado === anoLinha);
                const bateMes = (mesFiltrado === 'todos' || mesFiltrado === mesLinha);

                if (bateAno && bateMes) {
                    linha.style.display = '';
                    somaFiltrado += valor;
                } else {
                    linha.style.display = 'none';
                }
            });

            document.getElementById('total-filtrado').textContent = `R$ ${somaFiltrado.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('total-geral').textContent = `R$ ${somaGeral.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        }
    </script>
</body>
</html>
